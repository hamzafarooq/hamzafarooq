name: Update README with latest Substack posts

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and inject Substack posts
        run: |
          python3 - << 'PYEOF'
          import urllib.request
          import json
          import re

          url = "https://api.rss2json.com/v1/api.json?rss_url=https://boringbot.substack.com/feed"
          with urllib.request.urlopen(url) as resp:
              data = json.loads(resp.read())

          lines = []
          for item in data["items"][:5]:
              title = item["title"].strip()
              link  = item["link"].strip()
              date  = item["pubDate"][:10]
              lines.append(f"- [{title}]({link}) · {date}")

          block = "\n".join(lines)

          with open("README.md", "r") as f:
              content = f.read()

          updated = re.sub(
              r"(<!-- BLOG-POST-LIST:START -->).*?(<!-- BLOG-POST-LIST:END -->)",
              f"\\1\n{block}\n\\2",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print("Posts written:")
          print(block)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update Substack posts" && git push)
